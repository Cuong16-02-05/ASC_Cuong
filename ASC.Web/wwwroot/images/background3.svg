<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#795548"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Road -->
  <rect x="0" y="280" width="1200" height="120" fill="#37474f"/>
  <rect x="0" y="276" width="1200" height="8" fill="#546e7a"/>
  <!-- Road markings -->
  <rect x="100" y="336" width="80" height="8" rx="4" fill="white" opacity=".5"/>
  <rect x="280" y="336" width="80" height="8" rx="4" fill="white" opacity=".5"/>
  <rect x="460" y="336" width="80" height="8" rx="4" fill="white" opacity=".5"/>
  <rect x="640" y="336" width="80" height="8" rx="4" fill="white" opacity=".5"/>
  <rect x="820" y="336" width="80" height="8" rx="4" fill="white" opacity=".5"/>
  <rect x="1000" y="336" width="80" height="8" rx="4" fill="white" opacity=".5"/>
  <!-- Silhouette car -->
  <g transform="translate(480,200)" fill="#1a1a1a" opacity=".7">
    <rect x="0" y="40" width="240" height="60" rx="8"/>
    <rect x="30" y="10" width="180" height="50" rx="12"/>
    <circle cx="50" cy="100" r="28" fill="#1a1a1a"/>
    <circle cx="50" cy="100" r="12" fill="#37474f"/>
    <circle cx="190" cy="100" r="28" fill="#1a1a1a"/>
    <circle cx="190" cy="100" r="12" fill="#37474f"/>
  </g>
  <!-- Text -->
  <text x="600" y="160" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white" opacity=".9">Automobile Service Center</text>
</svg>
